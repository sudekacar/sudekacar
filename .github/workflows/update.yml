name: Update Profile README

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh SVG stats and stacks
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: sudekacar
          BIRTHDAY: ${{ secrets.BIRTHDAY }}
        run: python today.py

      - name: Commit SVG updates only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Never rewrite README.md — only update dynamic SVG + cache
          git add dark_mode.svg light_mode.svg top_languages.svg github_stats.svg cache/
          git diff --staged --quiet || (
            git commit -m "chore: refresh profile SVG stats" &&
            git push
          )
